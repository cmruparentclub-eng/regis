<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียน - สาธิต มรภ.เชียงใหม่</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { width: 160px; height: auto; border-radius: 8px; } 
        h2 { color: #1a5276; text-align: center; border-bottom: 3px solid #1a5276; padding-bottom: 10px; margin-top: 0; font-size: 20px; }
        .sub-title { text-align: center; color: #555; margin-top: -10px; margin-bottom: 20px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; background-color: #ffffff; border: 2px solid #2ecc71; }
        .bank-info { background: #ebf5fb; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; margin: 15px 0; }
        .qr-container { text-align: center; margin: 15px 0; padding: 10px; background: #fff; border: 1px dashed #bbb; border-radius: 10px; }
        .qr-container img { width: 220px; height: 220px; }
        .important-note { background: #fdf2f2; border: 1px solid #f8b4b4; color: #c0392b; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; text-align: center; }
        .btn-submit { width: 100%; padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #loading { display: none; text-align: center; color: #e67e22; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/cmruparentclub-eng/regis/main/logoชมรมขาวดำ.jpg" alt="Logo ชมรม" onerror="this.src='https://via.placeholder.com/150?text=LOGO+NOT+FOUND'">
    </div>
    <h2>ลงทะเบียนและชำระเงิน 2569</h2>
    <p class="sub-title">ชมรมผู้ปกครองและครูโรงเรียนสาธิต มรภ.เชียงใหม่</p>

    <div class="form-group">
        <label>ชื่อ-นามสกุล นักเรียน:</label>
        <input type="text" id="studentName" placeholder="ระบุชื่อ-นามสกุล">
    </div>
    <div class="form-group">
        <label>ระดับชั้น:</label>
        <select id="grade">
            <option value="500">อนุบาล (500.-)</option>
            <option value="1623">ประถมศึกษาปีที่ 1 (1,623.-)</option>
            <option value="1959">ประถมศึกษาปีที่ 2 (1,959.-)</option>
            <option value="1749">ประถมศึกษาปีที่ 3 (1,749.-)</option>
            <option value="1642">ประถมศึกษาปีที่ 4 (1,642.-)</option>
            <option value="1577">ประถมศึกษาปีที่ 5 (1,577.-)</option>
            <option value="1552">ประถมศึกษาปีที่ 6 (1,552.-)</option>
            <option value="1157">มัธยมศึกษาปีที่ 1 (1,157.-)</option>
            <option value="1691">มัธยมศึกษาปีที่ 2 (1,691.-)</option>
        </select>
    </div>
    <div class="form-group">
        <label>ลำดับพี่น้อง:</label>
        <select id="siblingOrder">
            <option value="1">คนที่ 1 (ไม่มีส่วนลด)</option>
            <option value="2">คนที่ 2 หรือ 3 (ลด 250.-)</option>
        </select>
    </div>
    <button class="btn-calc" onclick="showPaymentInfo()">ตรวจสอบยอดเงินและวิธีชำระเงิน</button>
    <div id="result">
        <div class="bank-info">
            <strong>🏦 ข้อมูลบัญชีธนาคาร:</strong><br>
            ชื่อบัญชี: <b>ชมรมผู้ปกครองและครูโรงเรียนสาธิต มรภ.เชียงใหม่</b><br>
            ธนาคาร: <b>ไทยพาณิชย์ (SCB)</b> เลขที่: <b>821-417951-8</b><br>
            ยอดโอน: <b id="totalDisplay" style="color: #1a5276; font-size: 22px;"></b>
        </div>
        <div class="qr-container">
            <div id="qrPlaceholder">กรุณาอัปโหลดรูป bank-qr.jpg</div>
            <img id="qrImage" src="bank-qr.jpg" alt="Bank QR" style="display:none;" onerror="this.style.display='none'; document.getElementById('qrPlaceholder').style.display='block';">
        </div>
        <div class="important-note">
            ⚠️ สำคัญ: กรุณาระบุ <span id="refId" style="text-decoration: underline;"></span> ในบันทึกช่วยจำ
        </div>
        <div class="form-group" style="margin-top: 20px;">
            <label>📸 แนบสลิปโอนเงิน:</label>
            <input type="file" id="slipFile" accept="image/*">
        </div>
        <div id="loading">🚀 กำลังส่งข้อมูล...</div>
        <button class="btn-submit" id="submitBtn" onclick="submitData()">ส่งหลักฐานการโอนเงิน</button>
    </div>
</div>

<script>
let globalData = {}; 
function showPaymentInfo() {
    const name = document.getElementById('studentName').value;
    if(!name) { alert("กรุณาระบุชื่อนักเรียน"); return; }
    const basePrice = parseInt(document.getElementById('grade').value);
    const siblingOrder = document.getElementById('siblingOrder').value;
    let discount = (siblingOrder === "2" && basePrice !== 1623 && basePrice !== 1157) ? 250 : 0;
    const total = basePrice - discount;
    const refNo = "REF" + Math.floor(100000 + Math.random() * 900000);
    globalData = { name: name, grade: document.getElementById('grade').options[document.getElementById('grade').selectedIndex].text, total: total, refNo: refNo };
    document.getElementById('totalDisplay').innerText = total.toLocaleString() + " บาท";
    document.getElementById('qrImage').style.display = 'inline-block';
    document.getElementById('qrPlaceholder').style.display = 'none';
    document.getElementById('refId').innerText = "Ref No: " + refNo;
    document.getElementById('result').style.display = "block";
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}
function submitData() {
    const fileInput = document.getElementById('slipFile');
    const file = fileInput.files[0];
    if (!file) { alert("กรุณาแนบรูปสลิปด้วยค่ะ"); return; }
    document.getElementById('loading').style.display = "block";
    document.getElementById('submitBtn').disabled = true;
    const reader = new FileReader();
    reader.onload = function(e) {
        globalData.imageFile = e.target.result;
        globalData.imageName = file.name;
        fetch('https://script.google.com/macros/s/AKfycbxa5XY6NwfmAprupzgiS7NYAF_ufgPzhiiFbpKPh0Q8w1QBOqmytydvCDAE6zr7eGX6/exec', {
            method: 'POST',
            body: JSON.stringify(globalData)
        })
        .then(res => res.text())
        .then(text => { alert("✅ สำเร็จเรียบร้อยแล้วค่ะ!"); location.reload(); })
        .catch(err => { alert("❌ ลองใหม่"); document.getElementById('loading').style.display = "none"; document.getElementById('submitBtn').disabled = false; });
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
