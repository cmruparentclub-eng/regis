        #result { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; background-color: #ffffff; border: 2px solid #2ecc71; animation: fadeIn 0.5s; }

        .important-note {

        .btn-submit { width: 100%; padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { background-color: #d35400; }
        .btn-submit:disabled { background-color: #bdc3c7; cursor: not-allowed; }
